# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
   push:
    branches:
      - test  # change if needed
    paths:
      - 'src/Hospital/**'
jobs:
  build:
 
    runs-on: ubuntu-latest 

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 6.0
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal 
    - name: Docker build and push
      uses: mr-smithers-excellent/docker-build-push@v6
      with:
          image: adeola1976/${{ secrets.REPONAME }} 
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          dockerfile: src/Hospital/Dockerfile
          tags: adeola1976/hospital:latest
    - name: Make script executable
      run:  chmod +x Script/updatemanifest.sh
    - name: Run script with env
      env:
          TOKEN: ${{ secrets.TOKEN }}
          BUILD_ID: ${{ github.run_id }}
          REPONAME: ${{ secrets.REPONAME }}
          USERNAME: ${{ secrets.DOCKER_USERNAME }}
          EMAIL: ${{ secrets.EMAIL }}
      run: ./Script/updatemanifest.sh 