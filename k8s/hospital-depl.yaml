 apiVersion: apps/v1
 kind: Deployment
 metadata:
   name: hospital-depl
 spec: 
   replicas: 1
   selector:
      matchLabels: 
         app: hospitalservice
   template:
      metadata:
         labels:
            app: hospitalservice
            build-id: adeola1976-24630149220
      spec:
         containers:  
            - name: hospitalservice
              image: adeola1976/hospital

---
 apiVersion: v1
 kind: Service    
 metadata:
   name: hospital-clusterip-srv
 spec:
   type: ClusterIP
   selector:
      app: hospitalservice
   ports:
      - name: hospitalservice
        protocol: TCP
        port: 80
        targetPort: 80