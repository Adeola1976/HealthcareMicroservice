 apiVersion: apps/v1
 kind: Deployment
 metadata:
   name: user-depl
 spec: 
   replicas: 1
   selector:
      matchLabels: 
         app: userservice
   template:
      metadata:
         labels:
            app: userservice
            build-id: adeola1976-24789765643
      spec:
         containers:  
            - name: userservice
              image: adeola1976/user

---
 apiVersion: v1
 kind: Service
 metadata:
   name: user-clusterip-srv
 spec:
   type: ClusterIP
   selector:
      app: userservice
   ports:
      - name: userservice
        protocol: TCP
        port: 80
        targetPort: 80